<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CC Inspect</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2309090b'/%3E%3Ccircle cx='13' cy='13' r='6' fill='none' stroke='%23d4d4d8' stroke-width='2.5'/%3E%3Cline x1='17.2' y1='17.2' x2='24' y2='24' stroke='%23d4d4d8' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E" />
    <script>
      // injected at runtime to avoid Bun's HTML bundler resolving these as build-time assets
      for (const [rel, href] of [["manifest", "/manifest.json"], ["apple-touch-icon", "/apple-touch-icon.png"]]) {
        const l = document.createElement("link"); l.rel = rel; l.href = href; document.head.appendChild(l);
      }
    </script>
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      @keyframes event-fade-in {
        from { background-color: rgb(6 78 59 / 0.2); }
        to { background-color: transparent; }
      }
      .tail-new-event {
        animation: event-fade-in 1.5s ease-out;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>
